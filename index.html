  <style>
  :root{
    --bg:#000000;
    --neon:#00ff6a;
    --muted:#6b6b6b;
    --card-bg:rgba(0,0,0,0.6);
    --soft-white: rgba(255,255,255,0.92);
    --shadow: rgba(0, 255, 106, 0.08);
    --card-max-width: 920px;
    --card-padding: 28px;
    --avatar-size: 96px;
  }
  @font-face { font-family: "XTerminus"; src: local("Consolas"), local("Courier New"), local("monospace"); }

  html,body{ min-height:100dvh; height:auto; margin:0; padding:0; background:var(--bg); color:var(--soft-white); font-family: "XTerminus", monospace; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; overflow:auto; -webkit-text-size-adjust:100%; }

  /* stronger visible vertical grid behind the canvas (page-level) */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    z-index:-3;
    pointer-events:none;
    background:
      radial-gradient(900px 360px at 46% 42%, rgba(0,255,106,0.02), transparent 28%),
      linear-gradient(180deg, rgba(0,0,0,0.62), rgba(0,0,0,0.78));
    mix-blend-mode: screen;
    opacity:1;
  }

  #app { position:relative; min-height:100dvh; width:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px; padding: calc(24px + env(safe-area-inset-top)) calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)); box-sizing:border-box; }

  /* the canvas sits under everything and draws the matrix rain + grid lines */
  #matrix { position:fixed; inset:0; z-index:0; width:100%; height:100%; display:block; mix-blend-mode:screen; pointer-events:none; background:transparent; opacity:1; transition:opacity .36s ease; }

  .crt-overlay { pointer-events:none; position:fixed; inset:0; z-index:2; mix-blend-mode:overlay; opacity:1; transition:opacity .36s ease; }
  .crt-overlay:before{ content:""; position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.6) 100%); opacity:0.85; }
  .scanlines { position:absolute; inset:0; background-image: linear-gradient(transparent 88%, rgba(0,0,0,0.28) 100%); background-size: 100% 2px; opacity:0.12; mix-blend-mode:overlay; }
  .center-glow { position:absolute; width:70vw; height:70vh; left:50%; top:50%; transform:translate(-50%, -50%); background: radial-gradient(circle at center, rgba(0,255,106,0.06), transparent 40%); filter:blur(28px); opacity:0.9; }

  /* card + UI (kept from original) */
  .card { position:relative; z-index:3; width:min(var(--card-max-width), 92%); max-width:var(--card-max-width); min-width:260px; padding:var(--card-padding); box-sizing:border-box; border-radius:18px; background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.45)); border:1px solid rgba(0,255,106,0.08); box-shadow: 0 10px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.02); display:flex; flex-direction:column; align-items:center; gap:18px; backdrop-filter: blur(8px) saturate(120%); transition: transform .22s cubic-bezier(.2,.9,.2,1), box-shadow .22s, opacity .36s; opacity:0; transform: translateY(12px) scale(.996); pointer-events:none; }
  .card.revealed { opacity:1; transform:none; pointer-events:auto; }
  .header { width:100%; display:flex; gap:12px; align-items:center; justify-content:center; flex-direction:column; }
  .avatar { width:var(--avatar-size); height:var(--avatar-size); border-radius:12px; overflow:hidden; border:2px solid rgba(0,255,106,0.12); box-shadow: 0 4px 20px rgba(0,255,106,0.04); }
  .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
  .title{ color:var(--neon); letter-spacing:1px; font-size:clamp(18px,3.2vw,28px); text-shadow: 0 0 10px rgba(0,255,106,0.26); margin-top:6px; }
  .subtitle{ color:var(--muted); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-top:2px; opacity:0.8; }

  .links{ width:100%; display:flex; gap:12px; align-items:center; justify-content:center; flex-direction:column; padding:8px 12px; max-height: calc(100dvh - 320px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .link{ width:100%; max-width:720px; display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:12px; background: linear-gradient(180deg, rgba(0,0,0,0.34), rgba(0,0,0,0.12)); border:1px solid rgba(0,255,106,0.04); box-shadow: 0 6px 22px rgba(0,0,0,0.4); transition: transform .16s, box-shadow .16s, opacity .36s; color:var(--soft-white); text-decoration:none; opacity:0; transform: translateY(8px); }
  .link.revealed{ opacity:1; transform:none; }

  .footer{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; color:var(--muted); font-size:12px; margin-top:6px; }
  .volume{ width:220px; display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:10px; border:1px solid rgba(255,255,255,0.02); background: linear-gradient(180deg, rgba(0,0,0,0.28), rgba(0,0,0,0.12)); }
  .volume input[type=range]{ -webkit-appearance:none; appearance:none; width:140px; height:6px; border-radius:6px; outline:none; background:linear-gradient(90deg, rgba(0,255,106,0.95) 0%, rgba(0,255,106,0.38) 60%, rgba(255,255,255,0.06) 100%); }
  .volume input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:10px; background:var(--neon); box-shadow:0 2px 8px rgba(0,255,106,0.24); border:2px solid rgba(0,0,0,0.6); }

  #enterOverlay{ position:fixed; inset:0; z-index:9998; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg, rgba(0,0,0,0.66), rgba(0,0,0,0.66)); }
  #enterBtn{ font-family: "XTerminus", monospace; font-size:20px; padding:24px 40px; border-radius:14px; background:rgba(0,0,0,0.64); color:var(--neon); border:2px solid rgba(0,255,106,0.08); cursor:pointer; box-shadow: 0 10px 40px rgba(0,255,106,0.06); }

  @media (max-width:640px){ :root{ --card-padding:16px; --avatar-size:72px; } .volume{ width:160px; } .link{ padding:10px; gap:10px; border-radius:10px; } .title{ font-size:20px; } .card{ padding:16px; border-radius:14px; } .links{ max-height: calc(100dvh - 280px); } }
  @media (hover:none){ .link:hover{ transform:none; box-shadow:none; } .link{ padding:14px; } }
  @media (prefers-reduced-motion: reduce){ .title, .card, .link, #matrix{ transition:none !important; animation:none !important; } }

  </style>

<script>
/* small utilities */
const $ = (s,ctx=document)=>ctx.querySelector(s);
const $$ = (s,ctx=document)=>Array.from(ctx.querySelectorAll(s));

/* detect device constraints (keeps reduced-motion/low-power behavior) */
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const ua = navigator.userAgent || '';
const isMobileUA = /Mobi|Android|iPhone|iPad|iPod|Windows Phone/i.test(ua);
const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const saveData = navigator.connection && (navigator.connection.saveData === true);
const UI_CONSTRAINTS = { reducedMotion: prefersReducedMotion, lowPower: saveData || isMobileUA, touch: isTouch };
console.log('UI_CONSTRAINTS', UI_CONSTRAINTS);

/* ---------------- Matrix rain + screenshot-accurate grid ---------------- */
(function matrixRain(){
  const canvas = document.getElementById('matrix');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  // character set focused on katakana + alnum to match screenshot feel
  const chars = 'ｱｧｶｻﾀﾅﾊﾏﾔｬﾗﾜｦｵｷｸｹｺｼｽｾｿﾁﾂｯﾃﾄﾆﾇﾈﾉﾋﾌﾍﾎﾐﾑﾒﾓﾘﾙｦｦ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz@#$&%*+-=<>[](){}|/';
  let dpr = Math.max(1, window.devicePixelRatio || 1);

  // base font size reduced for tighter grid so columns look dense like screenshot
  function computeFontSize(){
    let base = (window.innerWidth <= 420) ? 10 : 14;
    if(UI_CONSTRAINTS.lowPower) base = Math.max(9, Math.floor(base * 0.85));
    return Math.max(9, base);
  }

  let fontSize = computeFontSize();
  let width, height, columns;
  let drops = [];
  let animationId = null;
  let running = false;

  function setupSize(){
    fontSize = computeFontSize();
    dpr = Math.max(1, window.devicePixelRatio || 1);
    width = Math.floor(innerWidth);
    height = Math.floor(innerHeight);
    // make columns slightly narrower than font to create denser look
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.textBaseline = 'top';
    ctx.font = fontSize + 'px monospace';
    // slightly denser column math
    columns = Math.floor(width / (fontSize * 0.86)) + 2;
    drops = new Array(columns).fill(0).map(()=>Math.floor(Math.random()*height/fontSize));
  }
  setupSize();
  addEventListener('resize', ()=>{ setupSize(); drawStaticBackground(); });

  // draw static background so grid is visible even if animation is suppressed
  function drawStaticBackground(){
    ctx.clearRect(0,0,width,height);

    // deep, slightly textured black fill
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0,0,width,height);

    ctx.font = fontSize + 'px monospace';

    // Decide highlighted columns to mimic screenshot: one strong column near right, one mid-right thin highlight
    const mainHighlight = Math.max(3, Math.floor(columns * 0.88));
    const secondaryHighlight = Math.max(2, Math.floor(columns * 0.72));
    const tertiaryHighlight = Math.max(1, Math.floor(columns * 0.95));

    // draw many faint vertical glyph columns to build the grid
    for(let i=0;i<columns;i++){
      const x = Math.floor(i * (fontSize * 0.86));
      // vary whether this column is drawn to create an irregular pattern like the screenshot
      if(Math.random() > 0.72) continue;
      const length = Math.floor(Math.random()*18) + 6;
      // smaller alpha for faint glyphs
      for(let j=0;j<length;j++){
        const y = Math.floor((j * fontSize * (0.95 + Math.random()*1.3)) + Math.random()*height*0.02);
        const char = chars.charAt(Math.floor(Math.random()*chars.length));
        const alpha = 0.02 + Math.random()*0.05; // very faint, so grid is subtle
        ctx.fillStyle = `rgba(0,255,106,${alpha})`;
        ctx.fillText(char, x, y);
      }
      // occasionally a brighter char in the column
      if(Math.random() > 0.92){
        const hy = Math.floor(Math.random()*height);
        ctx.fillStyle = `rgba(0,255,106,${0.44 + Math.random()*0.2})`;
        ctx.fillText(chars.charAt(Math.floor(Math.random()*chars.length)), x, hy);
      }
    }

    // draw faint thin vertical lines for the column boundaries (gives the grid look)
    ctx.globalCompositeOperation = 'source-over';
    for(let i=0;i<columns;i++){
      const x = Math.floor(i * (fontSize * 0.86) + fontSize * 0.08);
      // make lines intermittent (skip some)
      if(i % 3 === 0) continue;
      ctx.fillStyle = 'rgba(0,255,106,0.008)';
      ctx.fillRect(x, 0, Math.max(1, Math.round(fontSize*0.04)), height);
    }

    // MAIN bright vertical streak(s) to match screenshot (right side)
    function drawHighlightColumn(colIndex, intensity){
      const x = Math.floor(colIndex * (fontSize * 0.86));
      // draw thicker faint glow rectangle behind
      ctx.fillStyle = `rgba(0,255,106,${0.02 * intensity})`;
      ctx.fillRect(x - Math.round(fontSize*0.8), 0, Math.round(fontSize*2.2), height);
      // draw stacked brighter glyphs down the column
      const segs = Math.floor(height / (fontSize*0.9));
      for(let s=0;s<segs;s++){
        if(Math.random() > 0.9) continue; // sparse
        const y = Math.floor(s * fontSize * (0.9 + Math.random()*0.3));
        const char = chars.charAt(Math.floor(Math.random()*chars.length));
        // variable bright alpha
        const alpha = 0.38 + Math.random()*0.42 * intensity;
        ctx.fillStyle = `rgba(200,255,210,${alpha})`;
        ctx.fillText(char, x, y);
      }
      // add few ultra-bright glyphs
      for(let f=0; f<4; f++){
        const y = Math.floor(Math.random()*height);
        ctx.fillStyle = `rgba(0,255,106,${0.7 + Math.random()*0.25})`;
        ctx.fillText(chars.charAt(Math.floor(Math.random()*chars.length)), x, y);
      }
    }

    // apply highlights: main (strong near right), secondary (mid-right), tertiary (very right)
    drawHighlightColumn(mainHighlight, 1.0);
    drawHighlightColumn(secondaryHighlight, 0.72);
    drawHighlightColumn(tertiaryHighlight, 0.6);

    // subtle vignette to darken edges like the screenshot
    const g = ctx.createLinearGradient(0,0,0,height);
    g.addColorStop(0,'rgba(0,0,0,0.06)');
    g.addColorStop(0.5,'rgba(0,0,0,0)');
    g.addColorStop(1,'rgba(0,0,0,0.18)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,width,height);
  }

  // dynamic animation loop: keep it slightly faster so glyphs slide down noticeably
  const SPEED_BASE = 1.9; // slightly more Matrix-y pace

  function loop(){
    // shorter trails for a more 'fast' feel (lower fade alpha)
    const fadeAlpha = UI_CONSTRAINTS.lowPower ? 0.18 : 0.08;
    ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
    ctx.fillRect(0,0,width,height);

    ctx.font = fontSize + 'px monospace';
    const speedMulti = UI_CONSTRAINTS.lowPower ? (SPEED_BASE * 0.7) : SPEED_BASE;

    // highlight columns similar to static background to emphasize streaks while animating
    const mainHighlight = Math.max(3, Math.floor(columns * 0.88));
    const secondaryHighlight = Math.max(2, Math.floor(columns * 0.72));
    const tertiaryHighlight = Math.max(1, Math.floor(columns * 0.95));

    for(let i=0;i<drops.length;i++){
      const x = Math.floor(i * (fontSize * 0.86));
      const y = Math.floor(drops[i] * fontSize);

      // pick char and brightness
      const char = chars.charAt(Math.floor(Math.random()*chars.length));
      // columns near highlights get slightly more brightness
      let colBoost = 0;
      if(i === mainHighlight) colBoost = 0.85;
      else if(i === secondaryHighlight) colBoost = 0.52;
      else if(i === tertiaryHighlight) colBoost = 0.42;
      const alpha = Math.min(1, 0.14 + Math.random()*0.5 + colBoost);

      // leading glyph often brighter (classic Matrix style)
      const leading = Math.random() > 0.78 || (i===mainHighlight && Math.random() > 0.46);

      if(leading){
        ctx.fillStyle = `rgba(220,255,220,${0.76 + Math.random()*0.18 + (colBoost*0.15)})`;
        ctx.fillText(char, x, y);
        // sometimes draw an ultra-bright pixel to mimic screenshot flicker in highlights
        if(Math.random() > 0.95){
          ctx.fillStyle = `rgba(0,255,106,${0.9})`;
          ctx.fillText(char, x, y - fontSize*0.12);
        }
      } else {
        ctx.fillStyle = `rgba(0,255,106,${Math.max(0.02, alpha*0.6)})`;
        ctx.fillText(char, x, y);
      }

      // advance the drop by a randomized amount scaled by speedMulti (faster rain)
      drops[i] = drops[i] + (0.8 + Math.random() * speedMulti);

      // reset with a biased probability (higher columns stay longer)
      if(y > height && Math.random() > 0.96){
        drops[i] = 0;
      }
    }

    // redraw faint vertical separators occasionally to keep the grid visible during motion
    ctx.globalCompositeOperation = 'source-over';
    for(let i=0;i<columns;i+=2){
      const rx = Math.floor(i * (fontSize * 0.86) + fontSize*0.08);
      ctx.fillStyle = 'rgba(0,255,106,0.006)';
      ctx.fillRect(rx, 0, Math.max(1, Math.round(fontSize*0.04)), height);
    }

    // faint additive glow overlay to give the green a softer bloom
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = 'rgba(0,255,106,0.0028)';
    ctx.fillRect(0,0,width,height);
    ctx.globalCompositeOperation = 'source-over';

    animationId = requestAnimationFrame(loop);
  }

  function start(){
    if(running) return;
    // if reduced-motion or low-power, do not auto animate (but keep static background)
    if(UI_CONSTRAINTS.reducedMotion || UI_CONSTRAINTS.lowPower){
      drawStaticBackground();
      running = false;
      return;
    }
    running = true;
    loop();
  }

  function stop(){
    if(animationId) cancelAnimationFrame(animationId);
    animationId = null;
    running = false;
    drawStaticBackground();
  }

  window.matrixController = { start, stop, isRunning: ()=>running, forceStart: ()=>{
    if(!running){ running = true; loop(); }
  } };

  // initial draw so grid matches screenshot even before animation starts
  drawStaticBackground();
})();

/* ---------------- Audio code (unchanged) ---------------- */
(function audioPlayer(){
  const audio = document.getElementById('bg-audio');
  const volumeSlider = document.getElementById('volumeSlider');
  const volLabel = document.getElementById('volLabel');

  const CANDIDATES = [
    { url: 'https://r2.guns.lol/7fdd2ffd-dcaa-41d0-93b1-5e4bc914206d.mp3', type: 'audio/mpeg' },
    { url: 'https://r2.guns.lol/97f40c6a-2261-4e77-8961-927cb56957e5.mp3', type: 'audio/mpeg' },
  ];

  let PLAY_MODE = 'playlist';
  audio.loop = true;
  audio.preload = 'auto';

  function showToast(msg, t=2200){
    let el = document.getElementById('bio-toast');
    if(!el){
      el = document.createElement('div');
      el.id = 'bio-toast';
      el.style.position='fixed';
      el.style.bottom='32px';
      el.style.left='50%';
      el.style.transform='translateX(-50%)';
      el.style.background='rgba(0,0,0,0.7)';
      el.style.border='1px solid rgba(0,255,106,0.06)';
      el.style.color='var(--neon)';
      el.style.padding='8px 12px';
      el.style.borderRadius='8px';
      el.style.zIndex=9999;
      el.style.fontFamily='monospace';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(()=> el.style.opacity = '0', t);
  }

  function setVolume(v){
    audio.volume = v;
    volLabel.textContent = Math.round(v*100) + '%';
    audio.muted = false;
  }
  setVolume(parseFloat(volumeSlider.value || 0.32));
  volumeSlider.addEventListener('input', e => setVolume(parseFloat(e.target.value)));

  audio.addEventListener('error', () => { console.error('Audio error event:', audio.error); showToast('Audio error — check console', 2800); });
  audio.addEventListener('canplaythrough', ()=> console.log('canplaythrough fired — good'));
  audio.addEventListener('loadedmetadata', ()=> console.log('loadedmetadata'));

  function mimeSupported(mime){
    try { const r = audio.canPlayType(mime); return r === 'probably' || r === 'maybe'; } catch(e){ return false; }
  }

  async function findAndLoadSources(){
    const loaded = [];
    for(const c of CANDIDATES){
      if(!c || !c.url) continue;
      if(!mimeSupported(c.type)){
        console.info('Skipping candidate (mime not supported by browser):', c.url, c.type);
        continue;
      }
      let ok = true;
      try { const res = await fetch(c.url, { method:'HEAD', cache:'no-cache' }); if(!res.ok) ok = false; } catch(err){}
      if(!ok) continue;
      loaded.push(c.url);
    }
    return loaded;
  }

  function setAudioSrc(url){ Array.from(audio.querySelectorAll('source')).forEach(s=>s.remove()); audio.src = url; try{ audio.load(); } catch(e){ console.warn('audio.load() threw', e); } }

  let playlist = [], currentIndex = 0, playlistMode = false, endedListener = null;
  function advanceIndex(){ if(playlist.length===0) return; currentIndex = (currentIndex+1) % playlist.length; }
  function preparePlaylistEndedHandler(){
    if(endedListener){ audio.removeEventListener('ended', endedListener); endedListener = null; }
    endedListener = async () => { advanceIndex(); const next = playlist[currentIndex]; try{ setAudioSrc(next); await audio.play(); } catch(err){ showToast('Playback error during playlist — check console', 3000); } };
    audio.addEventListener('ended', endedListener);
  }

  async function playFromUserGesture(){
    try{
      const chosen = await findAndLoadSources();
      if(!chosen || chosen.length===0){ showToast('No supported audio source found.',3800); return false; }
      playlistMode = (PLAY_MODE==='playlist' || (PLAY_MODE==='auto' && chosen.length>1));
      playlist = chosen.slice(); currentIndex = 0;
      if(playlistMode){
        setAudioSrc(playlist[0]); preparePlaylistEndedHandler();
        audio.muted = false;
        try{ await audio.play(); return true; } catch(e){ showToast('Playback failed — check console', 3800); return false; }
      } else {
        setAudioSrc(playlist[0]); audio.muted = false;
        try{ await audio.play(); return true; } catch(e){ showToast('Playback failed — check console', 3800); return false; }
      }
    } catch(e){ console.error('Unexpected error in playFromUserGesture:', e); showToast('Playback error — see console', 3800); return false; }
  }

  let audioUnlocked = false;
  async function unlockAudioOnGesture(){
    if(audioUnlocked) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC){ audioUnlocked = true; return; }
      const ctx = new AC(); if(ctx.state === 'suspended') await ctx.resume();
      const b = ctx.createBuffer(1,1,22050); const src = ctx.createBufferSource(); src.buffer = b; src.connect(ctx.destination); src.start(0);
      audioUnlocked = true;
    } catch(e){ audioUnlocked = true; console.warn('unlockAudioOnGesture failed:', e); }
  }
  document.body.addEventListener('pointerdown', unlockAudioOnGesture, {once:true, passive:true});

  window._bio_audio = audio;
  window._bio_audio_findAndLoad = findAndLoadSources;
  window._bio_audio_playFromUserGesture = playFromUserGesture;

  document.body.addEventListener('click', async function onBodyClick(){
    if(audio.paused && document.getElementById('enterOverlay') && document.getElementById('enterOverlay').classList.contains('hidden')){
      try{ await playFromUserGesture(); } catch(e){ console.warn('body click play failed', e); }
    }
  }, {passive:true});
})();

/* ---------------- Copy links + toasts ---------------- */
(function copyLinks(){
  const tiles = $$('.link');
  tiles.forEach(tile=>{
    tile.addEventListener('contextmenu', e=>{ e.preventDefault(); const url=tile.dataset.copy||tile.href; copyText(url); toast('Copied: '+url); });
    tile.addEventListener('auxclick', e=>{ if(e.button===1){ const url=tile.dataset.copy||tile.href; copyText(url); toast('Copied: '+url); } });
  });
  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); }); } else fallbackCopy(text);
  }
  function fallbackCopy(text){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); }catch(e){} ta.remove(); }
  let tTimer=null;
  function toast(msg){
    let t = document.getElementById('bio-toast');
    if(!t){ t=document.createElement('div'); t.id='bio-toast'; t.style.position='fixed'; t.style.bottom='32px'; t.style.left='50%'; t.style.transform='translateX(-50%)'; t.style.background='rgba(0,0,0,0.7)'; t.style.border='1px solid rgba(0,255,106,0.06)'; t.style.color='var(--neon)'; t.style.padding='8px 12px'; t.style.borderRadius='8px'; t.style.zIndex=9999; t.style.fontFamily='monospace'; document.body.appendChild(t); }
    t.textContent = msg; t.style.opacity = '1'; if(tTimer) clearTimeout(tTimer); tTimer = setTimeout(()=>{ t.style.opacity='0'; }, 1600);
  }
  const copyCard = document.getElementById('copyCard');
  if(copyCard) copyCard.addEventListener('click', e=>{ e.preventDefault(); copyText(location.href); toast('Profile link copied'); });
})();

/* ---------------- UI flow: enter button + toggles ---------------- */
(function uiFlow(){
  const enterOverlay = document.getElementById('enterOverlay');
  const enterBtn = document.getElementById('enterBtn');
  const card = document.querySelector('.card');
  const linkEls = Array.from(document.querySelectorAll('.link'));
  function toastInline(msg){ let t = document.getElementById('bio-toast'); if(!t){ t=document.createElement('div'); t.id='bio-toast'; t.style.position='fixed'; t.style.bottom='32px'; t.style.left='50%'; t.style.transform='translateX(-50%)'; t.style.background='rgba(0,0,0,0.7)'; t.style.border='1px solid rgba(0,255,106,0.06)'; t.style.color='var(--neon)'; t.style.padding='8px 12px'; t.style.borderRadius='8px'; t.style.zIndex=9999; t.style.fontFamily='monospace'; document.body.appendChild(t);} t.textContent = msg; t.style.opacity = '1'; setTimeout(()=> t.style.opacity='0', 2800); }

  enterBtn.addEventListener('click', async ()=>{
    enterOverlay.style.opacity='0'; enterOverlay.style.pointerEvents='none';
    setTimeout(()=> enterOverlay.classList.add('hidden'), 360);

    // start matrix if allowed (keeps suppressed behavior for low-power / reduced-motion)
    if(window.matrixController && !window.matrixController.isRunning()){
      if(!UI_CONSTRAINTS.lowPower && !UI_CONSTRAINTS.reducedMotion){
        window.matrixController.start();
      } else {
        console.log('matrix suppressed (lowPower/reducedMotion). Use Toggle Rain to force it on.');
      }
    }

    card.classList.add('revealed');
    linkEls.forEach((el,idx)=> setTimeout(()=> el.classList.add('revealed'), 160*idx) );

    try{
      if(window._bio_audio_playFromUserGesture){
        const ok = await window._bio_audio_playFromUserGesture();
        if(!ok) toastInline('Audio could not be started. See console.');
      } else {
        const audio = window._bio_audio || document.getElementById('bg-audio');
        try{ await audio.play(); } catch(e){ console.warn('Playback attempt failed', e); toastInline('Autoplay blocked — interact to start audio.'); }
      }
    } catch(e){ console.warn('Playback attempt failed:', e); toastInline('Autoplay blocked — interact if audio doesn’t start.'); }
  });

  const rainToggle = document.getElementById('toggleRain');
  if(rainToggle){
    rainToggle.addEventListener('click', e=>{
      e.preventDefault();
      if(window.matrixController){
        if(window.matrixController.isRunning()) window.matrixController.stop();
        else {
          if(UI_CONSTRAINTS.lowPower || UI_CONSTRAINTS.reducedMotion){
            window.matrixController.forceStart();
            toastInline('Matrix rain forced on (may affect performance).');
          } else window.matrixController.start();
        }
      }
    });
  }
})();

/* ---------------- keyboard quick-open ---------------- */
(function keyboardQuickOpen(){
  window.addEventListener('keydown', e=>{
    if(e.target && (e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA')) return;
    const idx = parseInt(e.key,10);
    if(!isNaN(idx) && idx>=1 && idx<=5){
      const link = document.querySelectorAll('.link')[idx-1];
      if(link) window.open(link.href, '_blank', 'noopener');
    }
  });
})();
