<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ItzJusTragic — Bot Commands</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%230a0e0a' width='32' height='32' rx='6'/%3E%3Cpath fill='%2300ff41' d='M8 8h4v4H8zm0 6h4v4H8zm0 6h16v2H8zm14-12h2v4h-2zm0 6h2v4h-2z'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e0a;
      --surface: #0d130d;
      --surface-hover: #111911;
      --border: #1a2f1a;
      --text: #b8ffb8;
      --text-dim: #7acc7a;
      --text-muted: #4d804d;
      --accent: #00ff41;
      --accent-dim: rgba(0, 255, 65, 0.12);
      --glow: rgba(0, 255, 65, 0.35);
      --discord: #5865f2;
      --twitch: #9146ff;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'JetBrains Mono', 'Share Tech Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Subtle grid + gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 100% 80% at 50% -10%, rgba(0, 255, 65, 0.06), transparent 50%),
        linear-gradient(rgba(0, 255, 65, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px, 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.9s var(--ease-out-expo);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav-buttons {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 500;
      font-size: 0.85rem;
      text-decoration: none;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      transition: color 0.35s var(--ease-in-out), border-color 0.35s var(--ease-in-out),
                  box-shadow 0.35s var(--ease-in-out), transform 0.35s var(--ease-in-out);
    }

    .nav-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
      box-shadow: 0 0 20px var(--accent-dim);
      transform: translateY(-2px);
    }

    .nav-btn.discord:hover {
      border-color: var(--discord);
      color: #fff;
      box-shadow: 0 0 24px rgba(88, 101, 242, 0.25);
    }

    .nav-btn.twitch:hover {
      border-color: var(--twitch);
      color: #fff;
      box-shadow: 0 0 24px rgba(145, 70, 255, 0.25);
    }

    .nav-btn svg {
      width: 1em;
      height: 1em;
      transition: transform 0.35s var(--ease-in-out);
    }

    .nav-btn:hover svg {
      transform: scale(1.1);
    }

    /* Logo */
    .logo-wrap {
      animation: logoIn 1s var(--ease-out-expo) 0.15s both;
    }

    @keyframes logoIn {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px var(--accent-dim), inset 0 0 24px rgba(0, 255, 65, 0.04);
      transition: box-shadow 0.5s var(--ease-in-out), border-color 0.4s var(--ease-in-out);
    }

    .logo-icon:hover {
      border-color: rgba(0, 255, 65, 0.4);
      box-shadow: 0 0 36px var(--accent-dim), 0 0 0 1px rgba(0, 255, 65, 0.1), inset 0 0 24px rgba(0, 255, 65, 0.06);
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      color: var(--accent);
      filter: drop-shadow(0 0 8px var(--glow));
    }

    .logo-icon-img {
      padding: 0;
      overflow: hidden;
    }

    .logo-icon-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Typewriter: full "ItzJusTragic" (12 chars + cursor), no cut off */
    .logo-text {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 24px var(--glow);
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      max-width: 0;
      animation: typewriterTyping 7s steps(13, end) infinite;
      transition: text-shadow 0.4s var(--ease-in-out);
      vertical-align: bottom;
    }

    @keyframes typewriterTyping {
      0% { max-width: 0; }
      20% { max-width: 16ch; }
      55% { max-width: 16ch; }
      75% { max-width: 0; }
      100% { max-width: 0; }
    }

    .logo-text .typewriter-cursor {
      display: inline-block;
      width: 0.1em;
      height: 0.9em;
      background: var(--accent);
      margin-left: 0.06em;
      vertical-align: -0.06em;
      animation: cursorBlink 1.1s ease-in-out infinite;
      box-shadow: 0 0 6px var(--glow);
      opacity: 1;
    }

    @keyframes cursorBlink {
      0%, 45% { opacity: 1; }
      50%, 95% { opacity: 0.25; }
      100% { opacity: 1; }
    }

    .logo:hover .logo-text {
      text-shadow: 0 0 32px var(--glow), 0 0 48px rgba(0, 255, 65, 0.2);
    }

    .logo-tagline {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* Section */
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      animation: fadeDown 0.7s var(--ease-out-expo) 0.25s both;
    }

    .section-title::before {
      content: '>';
      margin-right: 0.5rem;
      color: var(--accent);
    }

    .category-section {
      margin-bottom: 2.5rem;
    }

    .category-section:last-of-type {
      margin-bottom: 0;
    }

    /* Commands grid */
    .commands {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.85rem;
    }

    .cmd {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s var(--ease-in-out), box-shadow 0.4s var(--ease-in-out),
                  transform 0.4s var(--ease-in-out), background 0.4s var(--ease-in-out);
      animation: cardIn 0.6s var(--ease-out-expo) both;
    }

    .cmd::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform 0.4s var(--ease-in-out);
      border-radius: 3px 0 0 3px;
    }

    .cmd:hover {
      border-color: rgba(0, 255, 65, 0.35);
      box-shadow: 0 0 0 1px rgba(0, 255, 65, 0.15), 0 12px 40px rgba(0, 0, 0, 0.2), 0 0 32px var(--accent-dim);
      transform: translateY(-4px);
      background: var(--surface-hover);
    }

    .cmd:hover::before {
      transform: scaleY(1);
    }

    .cmd:hover .cmd-usage {
      text-shadow: 0 0 12px var(--glow);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .cmd-usage {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      transition: text-shadow 0.4s var(--ease-in-out);
    }

    .cmd-usage::before {
      content: '$ ';
      color: var(--text-muted);
      font-weight: 400;
    }

    .cmd-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .cmd-usage-line {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      line-height: 1.4;
    }

    .cmd-usage-line strong {
      color: var(--text-dim);
      font-weight: 500;
    }

    .note {
      margin-top: 2rem;
      padding: 1rem 1.2rem;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-dim);
      animation: fadeDown 0.7s var(--ease-out-expo) 0.6s both;
      transition: border-color 0.35s var(--ease-in-out), box-shadow 0.35s var(--ease-in-out);
    }

    .note:hover {
      border-color: rgba(0, 255, 65, 0.25);
      box-shadow: 0 0 20px var(--accent-dim);
    }

    .note strong {
      color: var(--accent);
    }

    /* Audio control — bottom left */
    .audio-ctrl {
      position: fixed;
      bottom: 1.25rem;
      left: 1.25rem;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: rgba(10, 14, 10, 0.94);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.3);
      animation: fadeDown 0.7s var(--ease-out-expo) 0.4s both;
      transition: border-color 0.35s var(--ease-in-out), box-shadow 0.35s var(--ease-in-out);
    }

    .audio-ctrl:hover {
      border-color: var(--text-muted);
      box-shadow: 0 0 28px var(--accent-dim), 0 0 0 1px rgba(0, 255, 65, 0.08);
    }

    .play-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      transition: border-color 0.35s var(--ease-in-out), box-shadow 0.35s var(--ease-in-out), transform 0.25s var(--ease-in-out);
    }

    .play-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-dim);
      transform: scale(1.05);
    }

    .play-btn svg {
      width: 14px;
      height: 14px;
    }

    .play-btn .icon-pause { display: none; }
    .play-btn .icon-play { display: block; }
    .play-btn:not(.paused) .icon-pause { display: block; }
    .play-btn:not(.paused) .icon-play { display: none; }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .vol-wrap span {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 4px;
      background: var(--surface);
      border-radius: 2px;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
      cursor: pointer;
      box-shadow: 0 0 8px var(--glow);
    }

    .vol-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px var(--glow);
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
      animation: fadeDown 0.7s var(--ease-out-expo) 0.2s both;
    }

    .tab-btn {
      padding: 0.6rem 1.25rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface);
      border: none;
      cursor: pointer;
      transition: color 0.25s, background 0.25s;
      border-right: 1px solid var(--border);
    }

    .tab-btn:last-child {
      border-right: none;
    }

    .tab-btn:hover {
      color: var(--text-dim);
      background: var(--surface-hover);
    }

    .tab-btn.active {
      color: var(--accent);
      background: var(--accent-dim);
      box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.06);
    }

    .tab-panel {
      display: none;
      animation: fadeDown 0.4s var(--ease-out-expo);
    }

    .tab-panel.active {
      display: block;
    }

    .about-panel {
      max-width: 560px;
      margin: 0 auto;
    }

    .about-panel h3 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }

    .about-panel h3::before {
      content: '>';
      margin-right: 0.5rem;
      color: var(--accent);
    }

    .about-panel p {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .about-panel p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <audio id="bgmusic" loop preload="auto">
    <source src="https://r2.guns.lol/7fdd2ffd-dcaa-41d0-93b1.mp3-5e4bc914206d" type="audio/mpeg">

  <div class="page">
    <header>
      <div class="nav-buttons">

          </div>
          <span class="logo-text" id="logo-text" aria-label="ItzJusTragic">ItzJusTragic<span class="typewriter-cursor"></span></span>

      </div>

      <div class="tab-bar">

        <button type="button" class="tab-btn" data-tab="mod" aria-pressed="false">Mod</button>
      </div>
    </header>

    <div class="tab-panel active" id="panel-everyone">
      <div id="commands-everyone"></div>
      <p class="note">
        <strong>Tip:</strong> Anyone can use these in chat. Join the Discord: <a href="https://discord.gg/Jg7FGGhmSH" target="_blank" rel="noopener" style="color: var(--discord);">discord.gg/Jg7FGGhmSH</a>

  <div class="audio-ctrl">
    <button type="button" class="play-btn paused" id="playbtn" title="Play / Pause">
      <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="vol-wrap">
      <span>Vol</span>
      <input type="range" class="vol-slider" id="vol" min="0" max="100" value="40" title="Volume">
    </div>
  </div>

  <script>
    const everyoneCategories = [
      { title: 'Stream & clips', commands: [
        ['!clip [5-60s]', 'Create a clip (e.g. !clip 60 or !clip 30s). Edit link picks 5-60s from ~90s window.', '!clip 60'],
        ['!topclip', 'Post the most viewed clip', '!topclip'],
      ]},
      { title: 'Channel info', commands: [
        ['!followers', 'Show follower count', '!followers'],
        ['!viewers', 'Show current viewer count', '!viewers'],
        ['!uptime', 'Show stream uptime', '!uptime'],
        ['!title', 'Show stream title', '!title'],
        ['!game', 'Show current game/category', '!game'],
        ['!latestfollower', 'Show latest follower', '!latestfollower'],
      ]},
      { title: 'General', commands: [
        ['!help', 'List all commands', '!help'],
        ['!commands', 'List built-in and custom commands', '!commands'],
      ]},
    ];

    const modCategories = [
      { title: 'Stream', commands: [
        ['!ad [30|60|90|120|150|180]', 'Start a commercial (streamer token)', '!ad 60'],
      ]},
      { title: 'Custom commands', commands: [
        ['!addcom !name response', 'Add custom command. Use $(url:https://...) for API.', '!addcom !discord Join https://discord.gg/Jg7FGGhmSH'],
        ['!delcom !name', 'Remove custom command', '!delcom !discord'],
      ]},
      { title: 'Timer', commands: [
        ['!timer start msg 15m', 'Send message every interval (5m, 15m, 1h, etc.)', '!timer start Join the discord https://discord.gg/Jg7FGGhmSH 15m'],
        ['!timer stop', 'Stop the timer', '!timer stop'],
      ]},
      { title: 'Moderation', commands: [
        ['!timeout user [sec]', 'Timeout user (default 600s)', '!timeout troll 300'],
        ['!ban user', 'Permanent ban', '!ban troll'],
        ['!clear', 'Clear chat', '!clear'],
      ]},
      { title: 'Chat settings', commands: [
        ['!slow [sec]', 'Slow mode (default 30s)', '!slow 10'],
        ['!slowoff', 'Disable slow mode', '!slowoff'],
        ['!subscribers', 'Subscribers-only chat', '!subscribers'],
        ['!subscribersoff', 'Subscribers-only off', '!subscribersoff'],
      ]},
    ];

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function renderCategories(containerId, categories) {
      const container = document.getElementById(containerId);
      let idx = 0;
      categories.forEach(cat => {
        const section = document.createElement('section');
        section.className = 'category-section';
        const title = document.createElement('h2');
        title.className = 'section-title';
        title.textContent = cat.title;
        section.appendChild(title);
        const grid = document.createElement('div');
        grid.className = 'commands';
        cat.commands.forEach(([usage, desc, example]) => {
          const el = document.createElement('div');
          el.className = 'cmd';
          el.style.animationDelay = `${0.35 + idx * 0.05}s`;
          el.innerHTML = '<span class="cmd-usage">' + escapeHtml(usage) + '</span><span class="cmd-desc">' + escapeHtml(desc) + '</span><span class="cmd-usage-line"><strong>Usage:</strong> ' + escapeHtml(example) + '</span>';
          grid.appendChild(el);
          idx++;
        });
        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    renderCategories('commands-everyone', everyoneCategories);
    renderCategories('commands-mod', modCategories);

    // Background music + volume
    const audio = document.getElementById('bgmusic');
    const playBtn = document.getElementById('playbtn');
    const volSlider = document.getElementById('vol');

    // Autoplay when user clicks anywhere (browsers require user gesture for audio)
    function startOnFirstClick() {
      audio.play().catch(() => {});
      playBtn.classList.remove('paused');
    }
    document.addEventListener('click', startOnFirstClick, { once: true });
    document.addEventListener('keydown', startOnFirstClick, { once: true });

    playBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (audio.paused) {
        audio.play().catch(() => {});
        playBtn.classList.remove('paused');
      } else {
        audio.pause();
        playBtn.classList.add('paused');
      }
    });

    volSlider.addEventListener('input', () => {
      audio.volume = volSlider.value / 100;
    });
    audio.volume = volSlider.value / 100;

    // Tab bar: switch between Everyone and Mod
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.toggle('active', b.getAttribute('data-tab') === tab);
          b.setAttribute('aria-pressed', b.getAttribute('data-tab') === tab ? 'true' : 'false');
        });
        document.querySelectorAll('.tab-panel').forEach(panel => {
          panel.classList.toggle('active', panel.id === 'panel-' + tab);
        });
      });
    });
  </script>
</body>
</html>
